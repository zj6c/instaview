<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>InstaView</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gradient-to-r from-purple-600 to-blue-500 min-h-screen">

<header class="flex justify-between items-center p-6 text-white">

<h1 class="text-2xl font-bold">InstaView</h1>

<nav class="space-x-6">
<a href="#">Home</a>
<a href="#">Features</a>
<a href="#">About</a>
</nav>

</header>


<div class="flex justify-center items-center mt-20">

<div class="bg-white w-[420px] rounded-2xl shadow-2xl p-8">

<h2 class="text-2xl font-bold text-center mb-4">
Chat Analyzer
</h2>

<p class="text-gray-500 text-center mb-6">
Upload voice or video and analyze interaction
</p>

<div class="h-40 overflow-y-auto border rounded-lg p-3 mb-4 bg-gray-50">
</div>

<input
type="text"
placeholder="Type message..."
class="w-full border rounded-lg p-3 mb-3"
/>

<div class="flex gap-2">

<button class="flex-1 bg-purple-600 text-white p-3 rounded-lg hover:bg-purple-700">
Send
</button>

<label class="flex-1 bg-blue-600 text-white p-3 rounded-lg text-center cursor-pointer">

Upload Media
<input type="file" accept="audio/*,video/*" class="hidden">

</label>

</div>

</div>

</div>

</body>

</html>
